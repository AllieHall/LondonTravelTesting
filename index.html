<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Converter App</title>
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
            background-color: #FFFDD0; /* Cream background */
            align-items: center;
            text-align: center;
        }
        
        .content { flex: 1; width: 100%; max-width: 300px; }
        
        input { 
            padding: 12px; 
            margin: 8px 0; 
            width: 100%; 
            font-size: 16px; 
            box-sizing: border-box;
            border: 1px solid black; /* Thin black border */
            border-radius: 4px;
        }

        button {
            padding: 12px;
            margin: 8px 0;
            width: 100%;
            font-size: 16px;
            box-sizing: border-box;
            background-color: #000080; /* Navy Blue */
            color: #FFFDD0; /* Cream text */
            border: none;
            border-radius: 5px;
        }
        
        .clear-btn { 
            background-color: #cc0000; /* Keeping a distinct red for 'Clear' */
            color: white; 
            font-weight: bold; 
            max-width: 300px;
        }
        
        #clock { 
            font-size: 1.2em; /* Slightly larger font */
            font-weight: bold; 
            margin: 15px 0; 
            color: #333; 
        }
    </style>
</head>
<body onload="clearAll(); updateClock(); setInterval(updateClock, 60000);">

    <div class="content">
        <h2>Currency</h2>
        <input type="number" id="amount" placeholder="Enter Amount">
        <button onclick="convert('USD')">USD to GBP</button>
        <button onclick="convert('GBP')">GBP to USD</button>
        <h3 id="moneyResult">Result: -</h3>

        <hr>

        <h2>Temperature</h2>
        <input type="number" id="temp" placeholder="Enter Degrees">
        <button onclick="convertTemp('F')">F to C</button>
        <button onclick="convertTemp('C')">C to F</button>
        <h3 id="tempResult">Result: -</h3>

        <p id="clock">Time: --:--</p>
    </div>

    <button class="clear-btn" onclick="clearAll()">Clear All</button>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Converter App</title>
    <style>
        body { 
            font-family: sans-serif; display: flex; flex-direction: column; min-height: 100vh; 
            margin: 0; padding: 20px; box-sizing: border-box; background-color: #BDDDFC;
            align-items: center; text-align: center;
        }
        .content { flex: 1; width: 100%; max-width: 300px; }
        
        /* Tab Styles */
        .tab-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; background-color: #384959; color: #BDDDFC; padding: 10px; border: none; border-radius: 5px; cursor: pointer; }
        .tab-content { display: none; }
        .active { display: block; }

        input { padding: 12px; margin: 8px 0; width: 100%; font-size: 16px; border: 1px solid black; border-radius: 4px; box-sizing: border-box; }
        button { padding: 12px; margin: 8px 0; width: 100%; font-size: 16px; background-color: #384959; color: #BDDDFC; border: none; border-radius: 5px; font-weight: bold; }
        .clear-btn { background-color: #cc0000; color: white; font-weight: bold; margin-top: 20px; }
        #clock { font-size: 1.2em; font-weight: bold; margin: 15px 0; color: #333; }
    </style>
</head>
<body onload="showTab('london'); updateClock(); setInterval(updateClock, 60000);">

    <div class="content">
        <div class="tab-buttons">
            <button class="tab-btn" onclick="showTab('london')">London</button>
            <button class="tab-btn" onclick="showTab('greece')">Greece</button>
        </div>

        <div id="london" class="tab-content">
            <h2>GBP Converter</h2>
            <input type="number" id="amt_london" placeholder="Amount (USD)">
            <button onclick="convert('london')">Convert</button>
            <h3 id="res_london">Result: -</h3>
        </div>

        <div id="greece" class="tab-content">
            <h2>EUR Converter</h2>
            <input type="number" id="amt_greece" placeholder="Amount (USD)">
            <button onclick="convert('greece')">Convert</button>
            <h3 id="res_greece">Result: -</h3>
        </div>

        <hr>

        <h2>Temperature</h2>
        <input type="number" id="temp" placeholder="Enter Degrees">
        <button onclick="convertTemp('F')">F to C</button>
        <button onclick="convertTemp('C')">C to F</button>
        <h3 id="tempResult">Result: -</h3>

        <p id="clock">Time: --:--</p>
    </div>

    <button class="clear-btn" onclick="clearAll()">Clear All</button>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.getElementById(tabId).style.display = 'block';
        }

        function convert(country) {
            let val = document.getElementById('amt_' + country).value;
            let res = document.getElementById('res_' + country);
            const rate = (country === 'london') ? 0.79 : 0.92; // GBP vs EUR rates
            res.innerText = "Result: " + (val * rate).toFixed(2);
        }

        function convertTemp(dir) {
            let val = parseFloat(document.getElementById('temp').value);
            let res = document.getElementById('tempResult');
            res.innerText = (dir === 'F') ? ((val - 32) * 5/9).toFixed(1) + "°C" : (val * 9/5 + 32).toFixed(1) + "°F";
        }

        function clearAll() {
            document.querySelectorAll('input').forEach(i => i.value = "");
            document.querySelectorAll('h3').forEach(h => h.innerText = "Result: -");
        }

        function updateClock() {
            const timeString = new Date().toLocaleTimeString("en-US", { timeZone: "America/New_York", hour: '2-digit', minute: '2-digit' });
            document.getElementById('clock').innerText = "EST Time: " + timeString;
        }
    </script>
</body>
</html>

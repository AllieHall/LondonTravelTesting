<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Converter App</title>
    <style>
        body { 
            font-family: sans-serif; display: flex; flex-direction: column; min-height: 100vh; 
            margin: 0; padding: 20px; box-sizing: border-box; background-color: #BDDDFC;
            align-items: center; text-align: center; transition: background-color 0.3s;
        }
        .content { flex: 1; width: 100%; max-width: 300px; padding-bottom: 90px; }
        
        .tab-content { display: none; }
        input { padding: 12px; margin: 8px 0; width: 100%; font-size: 16px; border: 1px solid black; border-radius: 4px; box-sizing: border-box; }
        button { padding: 12px; margin: 8px 0; width: 100%; font-size: 16px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        .btn-london { background-color: #384959; color: #BDDDFC; }
        .btn-greece { background-color: #2E6F40; color: #CFFFDC; }
        .greece-body { background-color: #CFFFDC !important; }
        .clear-btn { background-color: #cc0000; color: white; margin-top: 20px; }

        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; background: #384959; }
        .tab-btn { flex: 1; padding: 15px; background: none; border: none; border-top: 3px solid transparent; font-weight: bold; color: #8096a6; }
        .tab-btn.active-tab { border-top: 3px solid #FFF; color: #BDDDFC; background: #2a3845; }
        .greece-body .tab-bar { background-color: #2E6F40; }
        .greece-body .tab-btn { color: #87b393; }
        .greece-body .tab-btn.active-tab { color: #CFFFDC; background: #235832; }

        /* Unified Clock Style: Italic, normal weight, smaller size */
        .clock-display { font-size: 1.0em; font-style: italic; font-weight: normal; margin: 15px 0; color: #555; }
        
        .rate-container { margin-bottom: 25px; border-bottom: 1px solid #ccc; padding-bottom: 10px; }
    </style>
</head>
<body onload="initApp()">

    <div class="content">
        <div id="london" class="tab-content">
            <h2>London (GBP)</h2>
            <input type="number" id="amt_london" placeholder="Enter Amount">
            <button class="btn-london" onclick="convert('london', 'toLocal')">USD to GBP</button>
            <button class="btn-london" onclick="convert('london', 'toUSD')">GBP to USD</button>
            <h3 id="res_london">Result: -</h3>
            <hr>
            <h2>Temperature</h2>
            <input type="number" id="temp" placeholder="Enter Degrees">
            <button id="temp-btn-1" class="btn-london" onclick="convertTemp('F')">F to C</button>
            <button id="temp-btn-2" class="btn-london" onclick="convertTemp('C')">C to F</button>
            <h3 id="tempResult">Result: -</h3>
            <p id="clock1" class="clock-display">EST Time: --:--</p>
            <button class="clear-btn" onclick="clearAll()">Clear All</button>
        </div>

        <div id="greece" class="tab-content">
            <h2>Greece (EUR)</h2>
            <input type="number" id="amt_greece" placeholder="Enter Amount">
            <button class="btn-greece" onclick="convert('greece', 'toLocal')">USD to EUR</button>
            <button class="btn-greece" onclick="convert('greece', 'toUSD')">EUR to USD</button>
            <h3 id="res_greece">Result: -</h3>
            <hr>
            <h2>Temperature</h2>
            <input type="number" id="temp_greece" placeholder="Enter Degrees">
            <button id="temp-btn-3" class="btn-greece" onclick="convertTemp('F')">F to C</button>
            <button id="temp-btn-4" class="btn-greece" onclick="convertTemp('C')">C to F</button>
            <h3 id="tempResult_greece">Result: -</h3>
            <p id="clock2" class="clock-display">EST Time: --:--</p>
            <button class="clear-btn" onclick="clearAll()">Clear All</button>
        </div>

        <div id="rates" class="tab-content">
            <h2>Set Rates</h2>
            <div class="rate-container">
                <h3>London (USD to GBP)</h3>
                <input type="number" id="rate_london" placeholder="Current Rate" step="0.0001">
                <button class="btn-london" onclick="saveRate('london')">Save London Rate</button>
            </div>
            <div class="rate-container">
                <h3>Greece (USD to EUR)</h3>
                <input type="number" id="rate_greece" placeholder="Current Rate" step="0.0001">
                <button class="btn-greece" onclick="saveRate('greece')">Save Greece Rate</button>
            </div>
        </div>
    </div>

    <div class="tab-bar" id="tab-bar">
        <button class="tab-btn" id="btn_london" onclick="switchTab('london')">London</button>
        <button class="tab-btn" id="btn_greece" onclick="switchTab('greece')">Greece</button>
        <button class="tab-btn" id="btn_rates" onclick="switchTab('rates')">Rates</button>
    </div>

    <script>
        function initApp() {
            if (!localStorage.getItem('rate_london')) localStorage.setItem('rate_london', 0.79);
            if (!localStorage.getItem('rate_greece')) localStorage.setItem('rate_greece', 0.92);
            document.getElementById('rate_london').value = localStorage.getItem('rate_london');
            document.getElementById('rate_greece').value = localStorage.getItem('rate_greece');
            
            setInterval(updateClock, 60000);
            updateClock();
            switchTab('london');
        }

        function saveRate(country) {
            localStorage.setItem('rate_' + country, document.getElementById('rate_' + country).value);
            alert('Rate saved for ' + country + '!');
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(tabId).style.display = 'block';
            document.getElementById('btn_' + tabId).classList.add('active-tab');
            document.body.className = (tabId === 'greece') ? 'greece-body' : '';
            updateClock();
        }

        function convert(country, direction) {
            let val = parseFloat(document.getElementById('amt_' + country).value);
            let rate = parseFloat(localStorage.getItem('rate_' + country));
            let res = document.getElementById('res_' + country);
            const sym = (country === 'london') ? '£' : '€';
            if (isNaN(val)) return;
            res.innerText = (direction === 'toLocal') ? "Result: " + sym + (val * rate).toFixed(2) : "Result: $" + (val / rate).toFixed(2);
        }

        function convertTemp(dir) {
            // Updated to handle specific inputs per tab
            let isGreece = document.body.classList.contains('greece-body');
            let val = parseFloat(isGreece ? document.getElementById('temp_greece').value : document.getElementById('temp').value);
            let res = isGreece ? document.getElementById('tempResult_greece') : document.getElementById('tempResult');
            
            if (isNaN(val)) return;
            res.innerText = (dir === 'F') ? ((val - 32) * 5/9).toFixed(1) + "°C" : (val * 9/5 + 32).toFixed(1) + "°F";
        }

        function clearAll() {
            document.querySelectorAll('input[type="number"]:not([id^="rate_"])').forEach(i => i.value = "");
            document.querySelectorAll('h3').forEach(h => h.innerText = "Result: -");
        }

        function updateClock() {
            const timeString = new Date().toLocaleTimeString("en-US", { timeZone: "America/New_York", hour: '2-digit', minute: '2-digit' });
            document.getElementById('clock1').innerText = "EST Time: " + timeString;
            document.getElementById('clock2').innerText = "EST Time: " + timeString;
        }
    </script>
</body>
</html>

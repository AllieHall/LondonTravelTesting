<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Converter App</title>
    <style>
        body { 
            font-family: sans-serif; display: flex; flex-direction: column; min-height: 100vh; 
            margin: 0; padding: 20px; box-sizing: border-box; background-color: #BDDDFC;
            align-items: center; text-align: center;
        }
        .content { flex: 1; width: 100%; max-width: 300px; padding-bottom: 80px; }
        
        .tab-content { display: none; }
        .active { display: block; }

        input { padding: 12px; margin: 8px 0; width: 100%; font-size: 16px; border: 1px solid black; border-radius: 4px; box-sizing: border-box; }
        button { padding: 12px; margin: 8px 0; width: 100%; font-size: 16px; border: none; border-radius: 5px; font-weight: bold; }
        
        /* London Styles */
        .london-btn { background-color: #384959; color: #BDDDFC; }
        
        /* Greece Styles - Dynamic based on tab */
        .greece-body { background-color: #CFFFDC !important; }
        .greece-btn { background-color: #2E6F40; color: #CFFFDC; }

        .clear-btn { background-color: #cc0000; color: white; font-weight: bold; margin-top: 20px; width: 100%; }
        
        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; background: #384959; }
        .tab-btn { flex: 1; padding: 15px; color: #BDDDFC; background: none; border: none; border-top: 3px solid transparent; }
        .tab-btn.active-tab { border-top: 3px solid #FFF; background: #2a3845; }
        
        #clock { font-size: 1.3em; font-weight: bold; margin: 15px 0; color: #333; }
    </style>
</head>
<body onload="switchTab('london')">

    <div class="content" id="main-container">
        <div id="london" class="tab-content">
            <h2>London (GBP)</h2>
            <input type="number" id="amt_london" placeholder="Enter Amount">
            <button class="london-btn" onclick="convert('london', 'toLocal')">USD to GBP</button>
            <button class="london-btn" onclick="convert('london', 'toUSD')">GBP to USD</button>
            <h3 id="res_london">Result: -</h3>
        </div>

        <div id="greece" class="tab-content">
            <h2>Greece (EUR)</h2>
            <input type="number" id="amt_greece" placeholder="Enter Amount">
            <button class="greece-btn" onclick="convert('greece', 'toLocal')">USD to EUR</button>
            <button class="greece-btn" onclick="convert('greece', 'toUSD')">EUR to USD</button>
            <h3 id="res_greece">Result: -</h3>
        </div>

        <hr>

        <h2>Temperature</h2>
        <input type="number" id="temp" placeholder="Enter Degrees">
        <button class="london-btn" onclick="convertTemp('F')">F to C</button>
        <button class="london-btn" onclick="convertTemp('C')">C to F</button>
        <h3 id="tempResult">Result: -</h3>

        <p id="clock">EST Time: --:--</p>
        <button class="clear-btn" onclick="clearAll()">Clear All</button>
    </div>

    <div class="tab-bar">
        <button class="tab-btn" id="btn_london" onclick="switchTab('london')">London</button>
        <button class="tab-btn" id="btn_greece" onclick="switchTab('greece')">Greece</button>
    </div>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(tabId).style.display = 'block';
            document.getElementById('btn_' + tabId).classList.add('active-tab');
            
            // Toggle body background color based on tab
            document.body.className = (tabId === 'greece') ? 'greece-body' : '';
            
            updateClock();
        }

        function convert(country, direction) {
            let val = parseFloat(document.getElementById('amt_' + country).value);
            let res = document.getElementById('res_' + country);
            const rate = (country === 'london') ? 0.79 : 0.92;
            const sym = (country === 'london') ? '£' : '€';
            
            if (isNaN(val)) return;
            
            if (direction === 'toLocal') {
                res.innerText = "Result: " + sym + (val * rate).toFixed(2);
            } else {
                res.innerText = "Result: $" + (val / rate).toFixed(2);
            }
        }

        function convertTemp(dir) {
            let val = parseFloat(document.getElementById('temp').value);
            let res = document.getElementById('tempResult');
            res.innerText = (dir === 'F') ? ((val - 32) * 5/9).toFixed(1) + "°C" : (val * 9/5 + 32).toFixed(1) + "°F";
        }

        function clearAll() {
            document.querySelectorAll('input').forEach(i => i.value = "");
            document.querySelectorAll('h3').forEach(h => h.innerText = "Result: -");
        }

        function updateClock() {
            const timeString = new Date().toLocaleTimeString("en-US", { timeZone: "America/New_York", hour: '2-digit', minute: '2-digit' });
            document.getElementById('clock').innerText = "EST Time: " + timeString;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Converter App</title>
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
            background-color: #BDDDFC; /* Requested Background */
            align-items: center;
            text-align: center;
        }
        
        .content { flex: 1; width: 100%; max-width: 300px; }
        
        input { 
            padding: 12px; 
            margin: 8px 0; 
            width: 100%; 
            font-size: 16px; 
            box-sizing: border-box;
            border: 1px solid black; 
            border-radius: 4px;
        }

        button {
            padding: 12px;
            margin: 8px 0;
            width: 100%;
            font-size: 16px;
            box-sizing: border-box;
            background-color: #384959; /* Requested Button Color */
            color: #BDDDFC;           /* Requested Text Color */
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }
        
        .clear-btn { 
            background-color: #cc0000; /* Keeping distinct for clarity */
            color: white; 
            font-weight: bold; 
            max-width: 300px;
        }
        
        #clock { 
            font-size: 1.2em; 
            font-weight: bold; 
            margin: 15px 0; 
            color: #333; 
        }
    </style>
</head>
<body onload="clearAll(); updateClock(); setInterval(updateClock, 60000);">

    <div class="content">
        <h2>Currency</h2>
        <input type="number" id="amount" placeholder="Enter Amount">
        <button onclick="convert('USD')">USD to GBP</button>
        <button onclick="convert('GBP')">GBP to USD</button>
        <h3 id="moneyResult">Result: -</h3>

        <hr>

        <h2>Temperature</h2>
        <input type="number" id="temp" placeholder="Enter Degrees">
        <button onclick="convertTemp('F')">F to C</button>
        <button onclick="convertTemp('C')">C to F</button>
        <h3 id="tempResult">Result: -</h3>

        <p id="clock">Time: --:--</p>
    </div>

    <button class="clear-btn" onclick="clearAll()">Clear All</button>

    <script>
        function convert(dir) {
            let val = document.getElementById('amount').value;
            let res = document.getElementById('moneyResult');
            const rate = 0.79;
            if (val === "") return;
            res.innerText = (dir === 'USD') ? "Result: £" + (val * rate).toFixed(2) : "Result: $" + (val / rate).toFixed(2);
        }

        function convertTemp(dir) {
            let val = parseFloat(document.getElementById('temp').value);
            let res = document.getElementById('tempResult');
            if (isNaN(val)) return;
            res.innerText = (dir === 'F') ? "Result: " + ((val - 32) * 5/9).toFixed(1) + "°C" : "Result: " + (val * 9/5 + 32).toFixed(1) + "°F";
        }

        function clearAll() {
            document.getElementById('amount').value = "";
            document.getElementById('temp').value = "";
            document.getElementById('moneyResult').innerText = "Result: -";
            document.getElementById('tempResult').innerText = "Result: -";
        }
